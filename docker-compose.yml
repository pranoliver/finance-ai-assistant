version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./frontend:/app/frontend
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    container_name: finance_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mysql_data: